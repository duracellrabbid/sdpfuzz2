exclude: '^\.agents/'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: dependency-vulnerability-scan
        name: Dependency vulnerability scan (high/critical)
        entry: python scripts/check_dependency_vulns.py
        language: python
        additional_dependencies:
          - pip-audit>=2.7,<3.0
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]
        require_serial: true
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: mypy .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: pytest-coverage
        name: pytest-coverage
        entry: pytest -m "not integration" --cov=src/sdpfuzz2 --cov-report=term-missing --cov-fail-under=100
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
